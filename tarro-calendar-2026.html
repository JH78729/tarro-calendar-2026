<style>
:root {
  --color-bg-main: #f8fafc;
  --color-card-bg: #ffffff;
  --color-text-p1: #1e293b;
  --color-text-p2: #475569;
  --color-text-p3: #94a3b8;
  --color-border: #e2e8f0;
  --c-peak-bg: #f0fdf4; --c-peak-txt: #166534; --c-peak-dot: #22c55e;
  --c-mid-bg:  #eff6ff; --c-mid-txt:  #1e40af; --c-mid-dot:  #3b82f6;
  --c-low-bg:  #fff1f2; --c-low-txt:  #9f1239; --c-low-dot:  #f43f5e;
  --radius-lg: 12px; --radius-md: 8px; --radius-sm: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--color-bg-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

.wrap { padding: 2rem 1.5rem; max-width: 1400px; margin: 0 auto; }

.head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid var(--color-border); padding-bottom: 1.25rem; }
.head-l { display: flex; flex-direction: column; gap: 5px; }
.eyebrow { font-size: 11px; color: var(--color-text-p3); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
.h-title { font-size: 22px; font-weight: 700; color: var(--color-text-p1); letter-spacing: -0.02em; }
.head-r { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

.legend { display: flex; gap: 14px; flex-wrap: wrap; background: #fff; padding: 7px 16px; border-radius: 99px; border: 1px solid var(--color-border); }
.lg { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--color-text-p2); }
.sw { width: 7px; height: 7px; border-radius: 50%; }
.sw-peak{background:var(--c-peak-dot)} .sw-mid{background:var(--c-mid-dot)} .sw-low{background:var(--c-low-dot)}

.btn-save-all { font-size: 12px; font-weight: 700; padding: 7px 16px; border-radius: var(--radius-sm); cursor: pointer; border: none; background: #1e293b; color: #fff; transition: background 0.15s; }
.btn-save-all:hover { background: #334155; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

.cell { background: #fff; border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: all 0.18s ease; display: flex; flex-direction: column; }
.cell:hover { transform: translateY(-2px); box-shadow: 0 8px 16px -4px rgba(0,0,0,0.07); border-color: #cbd5e1; }
.cell.sel { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); transform: none; }

.c-top { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f1f5f9; background: #fafafa; }
.c-mon { font-size: 14px; font-weight: 700; color: var(--color-text-p1); }
.c-seas { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.s-peak{background:var(--c-peak-bg);color:var(--c-peak-txt);border:1px solid rgba(34,197,94,0.25)}
.s-mid {background:var(--c-mid-bg); color:var(--c-mid-txt); border:1px solid rgba(59,130,246,0.25)}
.s-low {background:var(--c-low-bg); color:var(--c-low-txt); border:1px solid rgba(244,63,94,0.25)}

.block { padding: 12px 14px; flex: 1; }
.blk-plan { border-bottom: 1px dashed var(--color-border); }
.blk-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.lbl-plan{color:#6366f1} .lbl-rev{color:#10b981}
.blk-big { font-size: 12px; font-weight: 600; line-height: 1.5; color: var(--color-text-p1); margin-bottom: 8px; }
.blk-ch { font-size: 11px; line-height: 1.5; color: var(--color-text-p2); margin-bottom: 4px; display: flex; align-items: flex-start; gap: 5px; }
.ch-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; background: #f1f5f9; color: var(--color-text-p2); flex-shrink: 0; margin-top: 2px; }
.win-pill { display: inline-flex; align-items: center; gap: 4px; background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; border-radius: 6px; font-size: 10px; padding: 2px 8px; margin-top: 6px; font-weight: 600; }
.empty-rev { font-size: 11px; color: var(--color-text-p3); font-style: italic; }

.panel { border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; background: #fff; animation: fadeIn 0.18s ease-out; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

.p-head { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; border-bottom: 1px solid var(--color-border); padding-bottom: 12px; flex-wrap: wrap; }
.p-mon { font-size: 18px; font-weight: 700; color: var(--color-text-p1); }
.p-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--color-border); background: #fff; color: var(--color-text-p2); transition: all 0.15s; }
.btn:hover { background: #f8fafc; }
.btn-primary { background: #1e293b; color: #fff; border-color: #1e293b; }
.btn-primary:hover { background: #334155; }
.btn-edit { border-color: #6366f1; color: #6366f1; }
.btn-edit:hover { background: #eef2ff; }
.btn-close { font-size: 22px; color: var(--color-text-p3); cursor: pointer; line-height: 1; border: none; background: none; padding: 0 4px; }
.btn-close:hover { color: var(--color-text-p1); }

.p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:700px){ .p-grid { grid-template-columns: 1fr; } }
.p-sec { border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 14px 16px; background: #f8fafc; }
.p-sec.full { grid-column: 1/-1; }
.p-sec.plan { background: #fafafa; border-left: 3px solid #6366f1; }
.p-sec.rev { background: #f0fdf4; border-left: 3px solid #10b981; border-color: rgba(16,185,129,0.2) rgba(16,185,129,0.2) rgba(16,185,129,0.2) #10b981; }
.p-slbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.p-cont { font-size: 13px; line-height: 1.6; color: var(--color-text-p1); }

.ch-line { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 7px; background: #fff; padding: 7px 10px; border-radius: var(--radius-sm); border: 1px solid #f1f5f9; }
.ch-line:last-child { margin-bottom: 0; }
.ch-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.ch-nm { font-weight: 700; color: var(--color-text-p1); }
.tag { display: inline-flex; align-items: center; background: #fff; border: 1px solid var(--color-border); border-radius: 5px; padding: 3px 10px; font-size: 11px; font-weight: 500; color: var(--color-text-p2); margin: 3px 5px 3px 0; }

.edit-field { width: 100%; border: 1px solid #c7d2fe; border-radius: var(--radius-sm); padding: 7px 10px; font-size: 13px; font-family: inherit; color: var(--color-text-p1); background: #fff; resize: vertical; line-height: 1.5; outline: none; transition: border-color 0.15s; }
.edit-field:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.12); }
.edit-label { font-size: 11px; font-weight: 600; color: var(--color-text-p3); text-transform: uppercase; letter-spacing: 0.05em; margin: 10px 0 4px; display: block; }
.ch-edit-row { display: grid; grid-template-columns: 72px 1fr; gap: 7px; margin-bottom: 7px; align-items: center; }
.ch-swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

.toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff; padding: 10px 20px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }


.persona-pill { display: inline-flex; align-items: center; gap: 4px; background: #f5f3ff; color: #5b21b6; border: 1px solid #ddd6fe; border-radius: 6px; font-size: 11px; padding: 2px 9px; font-weight: 600; margin-right: 6px; }
.hyp-box { background: #fefce8; border: 1px solid #fef08a; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #713f12; line-height: 1.5; }
.edit-label { font-size: 11px; font-weight: 600; color: var(--color-text-p3); text-transform: uppercase; letter-spacing: 0.05em; margin: 10px 0 4px; display: block; }

.footer-note { font-size: 12px; color: var(--color-text-p3); margin-top: 2rem; text-align: center; background: #fff; padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--color-border); line-height: 1.6; }
</style>
</head>

   hypothesis:"DM转retention; SMS测非旺季钩避疲劳; WeChat最值得扩量",
   persona:"P2 + P3",revShort:"SMS SQL→CW=94%,但旺季 SDR 满负荷",win:"SMS lead 质量",
   review:"SMS 进 SQL 几乎必成交(94%)。DM 旺季惨败 — 停新客。旺季 SDR 满负荷,减少需跟进的 lead。"},
  {id:"dec",mon:"December",seas:"peak",big:"年终复盘+新年Pipeline · 全用客户故事",events:["Christmas","Year-end review"],
   plan:[{n:"DM",c:"#1D9E75",a:"两Drop全用客户故事 · ⚠放弃圣诞主题"},{n:"SMS",c:"#378ADD",a:"「2027想轻松经营?现在开始」"},{n:"WeChat",c:"#7F77DD",a:"年终复盘 · 为1月铺垫"},{n:"XHS",c:"#D4537E",a:"★ SQL→CW=94% · 圣诞实录+年终盘点"},{n:"Google",c:"#EF9F27",a:"新年关键词 > 圣诞关键词"}],
   exp:"DM: Client story Drop1 vs Drop2 timing",
   hypothesis:"坚持Client Story; 弃纯节日copy; 新年决心角度",
   persona:"P1 主",revShort:"圣诞主题=失败,客户故事胜出",win:"客户故事 > 节日主题",
   review:"DM Drop2 圣诞主题拉低整体 — 2026 两个 Drop 都用客户故事。XHS 年终盘点 SQL→CW=94%。"}
];

function seasObj(s){ return s==="peak"?{l:"Peak",c:"s-peak"}:s==="mid"?{l:"Mid",c:"s-mid"}:{l:"Low",c:"s-low"}; }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function card(m){
  const s=seasObj(m.seas);
  const top3=m.plan.slice(0,3).map(c=>
    `<div class="blk-ch"><span class="ch-badge" style="border-left:3px solid ${c.c}">${c.n}</span><span>${c.a.length>24?c.a.slice(0,24)+'…':c.a}</span></div>`
  ).join("");
  const revBlock=m.win
    ?`<div style="font-size:11px;font-weight:600;color:var(--color-text-p1);margin-bottom:4px">${m.revShort}</div><span class="win-pill">🏆 ${m.win}</span>`
    :`<div class="empty-rev">${m.revShort||'(月末填)'}</div>`;
  return `<div class="cell" id="cell-${m.id}" onclick="sel('${m.id}')">
    <div class="c-top"><span class="c-mon">${m.mon}</span><span class="c-seas ${s.c}">${s.l}</span></div>
    <div class="block blk-plan">
      <div class="blk-label lbl-plan">🎯 计划 Plan</div>
      <div class="blk-big">${m.big}</div>
      ${top3}
    </div>
    <div class="block">
      <div class="blk-label lbl-rev">✅ 复盘 Review</div>
      ${revBlock}
    </div>
  </div>`;
}

function viewPanel(m){
  const s=seasObj(m.seas);
  const chs=m.plan.map(c=>
    `<div class="ch-line"><span class="ch-dot" style="background:${c.c}"></span><span><span class="ch-nm">${c.n}</span> — ${c.a}</span></div>`
  ).join("");
  const events=m.events.map(e=>`<span class="tag">📅 ${e}</span>`).join("");
  const winLine=m.win
    ?`<div class="win-pill" style="font-size:12px;padding:4px 12px;margin-bottom:10px;display:inline-flex">🏆 核心赢家: ${m.win}</div>`
    :`<div class="empty-rev" style="margin-bottom:10px">${m.revShort||'(月末填)'}</div>`;
  return `<div class="panel">
    <div class="p-head">
      <span class="p-mon">${m.mon} 2026</span>
      <span class="c-seas ${s.c}">${s.l} Season</span>
      <div class="p-actions">
        <button class="btn btn-edit" onclick="openEdit('${m.id}')">✏️ 编辑</button>
        <button class="btn-close" onclick="closeP()">×</button>
      </div>
    </div>
    <div class="p-grid">
      <div class="p-sec full plan">
        <div class="p-slbl lbl-plan">🎯 Big idea</div>
        <div class="p-cont" style="font-weight:600;font-size:14px;margin-bottom:8px">${m.big}</div>
        <div style="margin-bottom:8px">${events}</div>
        <span class="persona-pill">👥 ${m.persona||'—'}</span>
      </div>
      <div class="p-sec plan">
        <div class="p-slbl lbl-plan">🚀 渠道方向</div>
        <div class="p-cont">${chs}</div>
      </div>
      <div class="p-sec plan">
        <div class="p-slbl lbl-plan">🧪 实验假设 Hypothesis</div>
        <div class="hyp-box">${m.hypothesis||m.exp}</div>
        <div class="p-slbl lbl-plan" style="margin-top:10px">📋 实验执行 Experiment</div>
        <div class="p-cont" style="background:#fff;padding:8px 10px;border-radius:4px;border:1px solid #f1f5f9;margin-top:4px">${m.exp}</div>
      </div>
      <div class="p-sec full rev">
        <div class="p-slbl lbl-rev">✅ 复盘 & Learnings</div>
        ${winLine}
        <div class="p-cont" style="color:#064e3b">${m.review}</div>
      </div>
    </div>
  </div>`;
}

function editPanel(m){
  const s=seasObj(m.seas);
  const chRows=m.plan.map((c,i)=>
    `<div class="ch-edit-row">
      <span style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700">
        <span class="ch-swatch" style="background:${c.c}"></span>${c.n}
      </span>
      <input class="edit-field" id="ch-${m.id}-${i}" value="${c.a.replace(/"/g,'&quot;').replace(/</g,'&lt;')}">
    </div>`
  ).join("");
  return `<div class="panel">
    <div class="p-head">
      <span class="p-mon">${m.mon} 2026</span>
      <select class="edit-field" id="seas-${m.id}" style="width:120px;height:34px;resize:none">
        <option value="peak" ${m.seas==='peak'?'selected':''}>Peak 旺季</option>
        <option value="mid"  ${m.seas==='mid' ?'selected':''}>Mid 平季</option>
        <option value="low"  ${m.seas==='low' ?'selected':''}>Low 淡季</option>
      </select>
      <div class="p-actions">
        <button class="btn btn-primary" onclick="saveEdit('${m.id}')">✓ 保存</button>
        <button class="btn" onclick="sel('${m.id}')">取消</button>
        <button class="btn-close" onclick="closeP()">×</button>
      </div>
    </div>
    <div class="p-grid">
      <div class="p-sec full plan">
        <div class="p-slbl lbl-plan">🎯 Big idea</div>
        <textarea class="edit-field" id="big-${m.id}" rows="2">${m.big}</textarea>
        <span class="edit-label">关键事件 (逗号分隔)</span>
        <input class="edit-field" id="events-${m.id}" value="${m.events.join(', ')}">
      </div>
      <div class="p-sec plan" style="grid-column:1/-1">
        <div class="p-slbl lbl-plan">🚀 渠道方向</div>
        ${chRows}
      </div>
      <div class="p-sec plan">
        <div class="p-slbl lbl-plan">🧪 实验假设 Hypothesis</div>
        <textarea class="edit-field" id="hyp-${m.id}" rows="2">${m.hypothesis||''}</textarea>
        <span class="edit-label">实验执行 Experiment</span>
        <textarea class="edit-field" id="exp-${m.id}" rows="2">${m.exp}</textarea>
      </div>
      <div class="p-sec rev">
        <div class="p-slbl lbl-rev">👥 目标 Persona</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
          ${['P1 · 低信号社区外卖','P2 · 传统堂食','P3 · 数字化中餐厅'].map((label,i)=>{
            const val='P'+(i+1);
            const checked=(m.persona||'').includes(val)?'checked':'';
            return `<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--color-text-p1)">
              <input type="checkbox" id="persona-${m.id}-p${i+1}" value="${val}" ${checked}
                style="width:16px;height:16px;cursor:pointer;accent-color:#6366f1">
              <span><strong>${val}</strong> · ${label.split('·')[1].trim()}</span>
            </label>`;
          }).join('')}
        </div>
        <span class="edit-label">🏆 赢家角度</span>
        <input class="edit-field" id="win-${m.id}" placeholder="留空=待验证" value="${m.win||''}">
      </div>
      <div class="p-sec full rev">
        <div class="p-slbl lbl-rev">✅ 复盘摘要 (卡片显示)</div>
        <input class="edit-field" id="revShort-${m.id}" value="${m.revShort||''}">
        <span class="edit-label">复盘详情</span>
        <textarea class="edit-field" id="review-${m.id}" rows="4">${m.review}</textarea>
      </div>
    </div>
  </div>`;
}

function saveEdit(id){
  const m=D.find(x=>x.id===id);
  if(!m) return;
  m.seas=document.getElementById(`seas-${id}`).value;
  m.big=document.getElementById(`big-${id}`).value;
  m.events=document.getElementById(`events-${id}`).value.split(',').map(s=>s.trim()).filter(Boolean);
  m.hypothesis=document.getElementById(`hyp-${id}`).value;
  m.exp=document.getElementById(`exp-${id}`).value;
  m.persona=([1,2,3].filter(n=>document.getElementById(`persona-${id}-p${n}`)?.checked).map(n=>'P'+n).join(' + '))||'';
  m.win=document.getElementById(`win-${id}`).value||null;
  m.revShort=document.getElementById(`revShort-${id}`).value;
  m.review=document.getElementById(`review-${id}`).value;
  m.plan.forEach((c,i)=>{ c.a=document.getElementById(`ch-${id}-${i}`).value; });
  render();
  sel(id);
  showToast('✓ 已保存 — 记得另存为 HTML 文件更新团队版本');
}

function openEdit(id){
  const m=D.find(x=>x.id===id);
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('sel'));
  document.getElementById('cell-'+id).classList.add('sel');
  const p=document.getElementById('panel');
  p.innerHTML=editPanel(m);
  p.style.display='block';
  p.scrollIntoView({behavior:'smooth',block:'start'});
}

let cur=null;
function sel(id){
  if(cur===id){ closeP(); return; }
  cur=id;
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('sel'));
  document.getElementById('cell-'+id).classList.add('sel');
  const p=document.getElementById('panel');
  p.innerHTML=viewPanel(D.find(x=>x.id===id));
  p.style.display='block';
  p.scrollIntoView({behavior:'smooth',block:'start'});
}
function closeP(){
  cur=null;
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('sel'));
  document.getElementById('panel').style.display='none';
}
function render(){
  document.getElementById('grid').innerHTML=D.map(card).join("");
}
render();
</script>
</body>
</html>
