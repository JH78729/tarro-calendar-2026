<title>Tarro 2026 Plan + Review Calendar</title>

  --plan-bg:#fafafa;--plan-acc:#6366f1;--plan-txt:#4338ca;
  --rev-bg:#f0fdf4;--rev-acc:#10b981;
  --data-bg:#f0f9ff;--data-acc:#0ea5e9;--data-txt:#0369a1;
  --u-bg:#dcfce7;--u-txt:#166534;--c-bg:#dbeafe;--c-txt:#1e40af;
  --hi-clr:#059669;--lo-clr:#dc2626;--r:12px;--rm:8px;--rs:4px;

@media(prefers-color-scheme:dark){:root{
  --bg:#0f172a;--card:#1e293b;--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --bd:#334155;--bd2:#263348;
  --peak-bg:#052e16;--peak-txt:#86efac;
  --mid-bg:#1e3a5f;--mid-txt:#93c5fd;
  --low-bg:#4c0519;--low-txt:#fda4af;
  --plan-bg:#1e1b4b;--plan-acc:#818cf8;--plan-txt:#a5b4fc;
  --rev-bg:#052e16;--rev-acc:#34d399;
  --data-bg:#082f49;--data-acc:#38bdf8;--data-txt:#7dd3fc;
  --u-bg:#14532d;--u-txt:#86efac;--c-bg:#1e3a5f;--c-txt:#93c5fd;
  --hi-clr:#4ade80;--lo-clr:#f87171;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--t1);}
.wrap{padding:1.5rem;max-width:1400px;margin:0 auto;}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--bd);padding-bottom:1rem;}
.eyebrow{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;font-weight:600;}
.h-title{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.02em;margin-top:3px;}
.legend{display:flex;gap:10px;flex-wrap:wrap;background:var(--card);padding:6px 14px;border-radius:99px;border:1px solid var(--bd);font-size:11px;}
.lg{display:flex;align-items:center;gap:5px;font-weight:500;color:var(--t2);}
.sw{width:7px;height:7px;border-radius:50%;}
.sw-pk{background:var(--peak-dot)}.sw-mi{background:var(--mid-dot)}.sw-lo{background:var(--low-dot)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
.cell{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .18s ease;display:flex;flex-direction:column;}
.cell:hover{transform:translateY(-2px);box-shadow:0 8px 16px -4px rgba(0,0,0,.15);border-color:var(--t3);}
.cell.sel{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.2);transform:none;}
.c-top{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd2);background:var(--plan-bg);}
.c-mon{font-size:14px;font-weight:700;color:var(--t1);}
.c-seas{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.s-peak{background:var(--peak-bg);color:var(--peak-txt);}
.s-mid{background:var(--mid-bg);color:var(--mid-txt);}
.s-low{background:var(--low-bg);color:var(--low-txt);}
.block{padding:12px 14px;flex:1;}
.blk-plan{border-bottom:1px dashed var(--bd);}
.blk-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.lbl-p{color:var(--plan-acc)}.lbl-r{color:var(--rev-acc)}.lbl-d{color:var(--data-acc)}
.blk-big{font-size:12px;font-weight:600;line-height:1.5;color:var(--t1);margin-bottom:8px;}
.blk-ch{font-size:11px;line-height:1.5;color:var(--t2);margin-bottom:4px;display:flex;align-items:flex-start;gap:5px;}
.ch-b{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--bd2);color:var(--t2);flex-shrink:0;margin-top:2px;}
.chips{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.chip{display:inline-flex;align-items:center;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;}
.chip-u{background:var(--u-bg);color:var(--u-txt);}
.chip-c{background:var(--c-bg);color:var(--c-txt);}
.l-snip{font-size:11px;color:var(--t2);margin-top:5px;line-height:1.4;}
.empty-rev{font-size:11px;color:var(--t3);font-style:italic;}
.panel{border:1px solid var(--bd);border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem;background:var(--card);animation:fi .18s ease-out;}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.p-head{display:flex;align-items:center;gap:10px;margin-bottom:1rem;border-bottom:1px solid var(--bd);padding-bottom:10px;flex-wrap:wrap;}
.p-mon{font-size:18px;font-weight:700;color:var(--t1);}
.p-actions{margin-left:auto;}
.btn-x{font-size:22px;color:var(--t3);cursor:pointer;line-height:1;border:none;background:none;padding:0 4px;}
.btn-x:hover{color:var(--t1);}
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:700px){.p-grid{grid-template-columns:1fr;}}
.p-sec{border:1px solid var(--bd);border-radius:var(--rm);padding:12px 14px;background:var(--bg);}
.p-sec.full{grid-column:1/-1;}
.p-sec.plan{background:var(--plan-bg);border-left:3px solid var(--plan-acc);}
.p-sec.rev{background:var(--rev-bg);border-left:3px solid var(--rev-acc);}
.p-sec.data{background:var(--data-bg);border-left:3px solid var(--data-acc);}
.p-slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;color:var(--t3);}
.p-cont{font-size:13px;line-height:1.6;color:var(--t1);}
.ch-line{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;background:var(--card);padding:7px 10px;border-radius:var(--rs);border:1px solid var(--bd2);}
.ch-line:last-child{margin-bottom:0;}
.ch-dot{width:6px;height:6px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.ch-nm{font-weight:700;color:var(--t1);font-size:13px;}
.tag{display:inline-flex;align-items:center;background:var(--card);border:1px solid var(--bd);border-radius:5px;padding:3px 9px;font-size:11px;font-weight:500;color:var(--t2);margin:3px 5px 3px 0;}
.persona-pill{display:inline-flex;align-items:center;gap:4px;background:#f5f3ff;color:#5b21b6;border:1px solid #ddd6fe;border-radius:6px;font-size:11px;padding:2px 9px;font-weight:600;}
@media(prefers-color-scheme:dark){.persona-pill{background:#3b0764;color:#d8b4fe;border-color:#7c3aed;}}
.hyp-box{background:#fefce8;border:1px solid #fef08a;border-radius:6px;padding:8px 12px;font-size:12px;color:#713f12;line-height:1.5;}
@media(prefers-color-scheme:dark){.hyp-box{background:#422006;border-color:#92400e;color:#fcd34d;}}
.ftable{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px;}
.ftable th{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;padding:4px 6px;text-align:center;border-bottom:1px solid var(--bd);}
.ftable th.lc{text-align:left;}
.ftable td{padding:5px 6px;text-align:center;border-bottom:.5px solid var(--bd2);color:var(--t1);}
.ftable td.lc{text-align:left;font-weight:700;}
.ftable tr.tot td{font-weight:700;background:var(--plan-bg);border-top:1px solid var(--bd);}
.td-u{color:var(--u-txt);font-weight:700;}
.td-c{color:var(--c-txt);font-weight:700;}
.hi{color:var(--hi-clr);font-weight:600;}
.lo{color:var(--lo-clr);font-weight:600;}
.li{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:.5px solid var(--bd2);font-size:12px;line-height:1.5;color:var(--t1);}
.li:last-child{border-bottom:none;padding-bottom:0;}
.li-ic{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px;}
.ic-p{background:var(--u-bg);color:var(--u-txt);}
.ic-n{background:#fee2e2;color:#dc2626;}
.ic-w{background:#fef9c3;color:#854d0e;}
@media(prefers-color-scheme:dark){
  .ic-n{background:#450a0a;color:#f87171;}
  .ic-w{background:#422006;color:#fcd34d;}
}
.li-lbl{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--t3);letter-spacing:.05em;margin-bottom:2px;}
.cohort-note{display:flex;gap:12px;font-size:11px;color:var(--t2);margin-bottom:8px;flex-wrap:wrap;}
.upd{font-size:11px;color:var(--t3);margin-top:1.5rem;text-align:center;}
</style>
</head>

const NOW=new Date();
function isPast(mn){return(2026<NOW.getFullYear())||(2026===NOW.getFullYear()&&mn<NOW.getMonth()+1);}
function isCurrent(mn){return 2026===NOW.getFullYear()&&mn===NOW.getMonth()+1;}
function seasObj(s){return s==="peak"?{l:"Peak",c:"s-peak"}:s==="mid"?{l:"Mid",c:"s-mid"}:{l:"Low",c:"s-low"};}
function fv(v){return v!=null?v+'%':'—';}
function fc(v){if(v==null)return'';return v>=60?'hi':v<=25?'lo':'';}

function card(m){
  const s=seasObj(m.seas);
  const top3=m.plan.slice(0,3).map(c=>
    `<div class="blk-ch"><span class="ch-b" style="border-left:3px solid ${c.c}">${c.n}</span><span>${c.a.length>24?c.a.slice(0,24)+'…':c.a}</span></div>`
  ).join("");
  const ld=LD[m.mn];const past=isPast(m.mn),cur=isCurrent(m.mn);
  const ll=AUTO_L[m.mn];
  let bot='';
  if(ld){
    bot=`<div class="chips"><span class="chip chip-u">U: ${ld._t.u} CW</span><span class="chip chip-c">C: ${ld._t.c} CW</span></div>`;
    if(ll)bot+=`<div class="l-snip">${ll[0].lb}: ${ll[0].tx.split(' — ')[0]}</div>`;
  }else{bot='<div class="empty-rev">月末填 · 点开查看计划</div>';}
  return `<div class="cell" id="cell-${m.id}" onclick="sel('${m.id}')">
    <div class="c-top"><span class="c-mon">${m.mon}</span><span class="c-seas ${s.c}">${s.l}</span></div>
    <div class="block blk-plan"><div class="blk-lbl lbl-p">🎯 计划</div><div class="blk-big">${m.big}</div>${top3}</div>
    <div class="block"><div class="blk-lbl lbl-r">✅ 复盘</div>${bot}</div>
  </div>`;
}

function viewPanel(m){
  const s=seasObj(m.seas);
  const chs=m.plan.map(c=>`<div class="ch-line"><span class="ch-dot" style="background:${c.c}"></span><span><span class="ch-nm">${c.n}</span> — ${c.a}</span></div>`).join("");
  const events=m.events.map(e=>`<span class="tag">📅 ${e}</span>`).join("");
  const ld=LD[m.mn];const ll=AUTO_L[m.mn];
  let ds='';
  if(ld){
    const rows=ld.rows.map(d=>`<tr>
      <td class="lc" style="color:${CH_COL[d.ch]||'var(--t1)'}">${d.ch}</td>
      <td>${d.mel}</td><td class="${fc(d.mm)}">${fv(d.mm)}</td>
      <td class="${fc(d.ms)}">${fv(d.ms)}</td>
      <td class="${fc(d.sc)}">${fv(d.sc)}</td>
      <td class="td-u">${d.cw_u}</td><td class="td-c">${d.cw_c}</td>
    </tr>`).join("");
    ds=`<div class="p-sec full data">
      <div class="p-slbl lbl-d">📊 实际数据 · Lightdash · 全渠道</div>
      <div class="cohort-note">
        <span><span style="width:8px;height:8px;border-radius:2px;background:var(--u-bg);display:inline-block;margin-right:3px"></span>Uncohorted = 当月实际成交</span>
        <span><span style="width:8px;height:8px;border-radius:2px;background:var(--c-bg);display:inline-block;margin-right:3px"></span>Cohorted = 按MEL日期归属</span>
      </div>
      <table class="ftable">
        <thead><tr><th class="lc">渠道</th><th>MEL</th><th>MEL→MQL</th><th>MQL→SQL</th><th>SQL→CW</th><th>CW(U)</th><th>CW(C)</th></tr></thead>
        <tbody>${rows}<tr class="tot"><td class="lc">Total</td><td>—</td><td>—</td><td>—</td><td>—</td><td class="td-u">${ld._t.u}</td><td class="td-c">${ld._t.c}</td></tr></tbody>
      </table>
      <div style="font-size:10px;color:var(--t3);margin-top:5px">绿色 ≥60% · 红色 ≤25%</div>
    </div>`;
  }
  let ls='';
  if(ll){
    const items=ll.map(l=>{
      const ic=l.t==='p'?'✓':l.t==='n'?'✗':'!';
      const cls=l.t==='p'?'ic-p':l.t==='n'?'ic-n':'ic-w';
      return `<div class="li"><div class="li-ic ${cls}">${ic}</div><div><div class="li-lbl">${l.lb}</div><div>${l.tx}</div></div></div>`;
    }).join("");
    ls=`<div class="p-sec full rev"><div class="p-slbl lbl-r">🔁 Data-Driven Learnings</div>${items}</div>`;
  }
  return `<div class="panel">
    <div class="p-head">
      <span class="p-mon">${m.mon} 2026</span><span class="c-seas ${s.c}">${s.l}</span>
      ${m.persona?`<span class="persona-pill">👥 ${m.persona}</span>`:''}
      <div class="p-actions"><button class="btn-x" onclick="closeP()">×</button></div>
    </div>
    <div class="p-grid">
      <div class="p-sec full plan">
        <div class="p-slbl lbl-p">🎯 Big idea</div>
        <div class="p-cont" style="font-weight:600;font-size:14px;margin-bottom:8px">${m.big}</div>
        <div>${events}</div>
      </div>
      <div class="p-sec plan"><div class="p-slbl lbl-p">🚀 渠道方向</div><div class="p-cont">${chs}</div></div>
      <div class="p-sec plan">
        <div class="p-slbl lbl-p">🧪 实验假设</div>
        <div class="hyp-box">${m.hypothesis||'—'}</div>
        <div class="p-slbl lbl-p" style="margin-top:10px">📋 实验执行</div>
        <div class="p-cont" style="background:var(--card);padding:8px 10px;border-radius:4px;border:1px solid var(--bd2);margin-top:4px;font-size:12px">${m.exp}</div>
      </div>
      ${ds}${ls}
    </div>
  </div>`;
}

let cur=null;
function sel(id){
  if(cur===id){closeP();return;}
  cur=id;
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('sel'));
  document.getElementById('cell-'+id).classList.add('sel');
  const p=document.getElementById('panel');
  p.innerHTML=viewPanel(D.find(x=>x.id===id));
  p.style.display='block';
  p.scrollIntoView({behavior:'smooth',block:'start'});
}
function closeP(){
  cur=null;
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('sel'));
  document.getElementById('panel').style.display='none';
}
document.getElementById('grid').innerHTML=D.map(card).join("");
</script>
